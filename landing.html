<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFCF Meeting Notice Manager</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f8f7f4;
      padding: 20px;
      line-height: 1.6;
    }
    .container { max-width: 720px; margin: 0 auto; }
    h1 { font-size: 28px; margin-bottom: 8px; color: #1a1a1a; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    button.primary {
      background: #0066cc;
      color: white;
    }
    button.primary:hover { background: #0052a3; }
    button.primary:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary {
      background: white;
      border: 1px solid #ddd;
      color: #1a1a1a;
    }
    button.secondary:hover { background: #f5f5f5; }
    button.back { background: none; border: none; color: #0066cc; padding: 0; margin-bottom: 20px; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 12px;
    }
    textarea { min-height: 80px; resize: vertical; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #1a1a1a; }
    .form-group { margin-bottom: 18px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title { font-weight: 500; color: #1a1a1a; margin-bottom: 4px; }
    .card-meta { font-size: 13px; color: #666; }
    .recipient-count { display: inline-block; background: #f0f0f0; padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-top: 12px; }
    .checkbox-group { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .checkbox-group label { margin-bottom: 0; display: flex; align-items: center; font-weight: normal; }
    .checkbox-group input { width: auto; margin-right: 8px; }
    .state-list { max-height: 250px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; padding: 12px; }
    .state-list label { margin-bottom: 6px; display: flex; align-items: center; }
    .state-list input { width: auto; margin-right: 8px; }
    .preview-box {
      background: #f8f7f4;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 18px;
    }
    .preview-number { font-size: 20px; font-weight: 500; color: #1a1a1a; margin: 12px 0; }
    .preview-list { font-size: 12px; color: #666; }
    .preview-list-item { margin-bottom: 6px; padding: 4px; background: white; border-radius: 4px; }
    .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
    .empty-state { text-align: center; padding: 40px 20px; color: #666; }
    .success-msg { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .error-msg { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .warning-msg { background: #fff3cd; border: 1px solid #ffc107; color: #856404; padding: 12px; border-radius: 6px; margin-bottom: 16px; }
    .loading { opacity: 0.6; }
    .setup-box { background: #e7f3ff; border: 1px solid #b3d9ff; padding: 16px; border-radius: 6px; margin-bottom: 20px; }
    .setup-box p { margin: 0 0 8px; font-size: 14px; color: #004085; }
    .setup-box code { background: white; padding: 2px 4px; border-radius: 3px; font-family: monospace; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;

    function AFCFApp() {
      // IMPORTANT: Replace this with your actual Google Apps Script URL
      // You get this when you deploy the script as a Web App
      const SCRIPT_URL = "https://script.google.com/macros/d/YOUR_SCRIPT_ID/userweb?v=YOUR_VERSION";

      const nigerianStates = [
        'Abia', 'Adamawa', 'Akwa Ibom', 'Anambra', 'Bauchi', 'Bayelsa', 'Benue', 'Borno',
        'Cross River', 'Delta', 'Ebonyi', 'Edo', 'Ekiti', 'Enugu', 'Gombe', 'Imo',
        'Jigawa', 'Kaduna', 'Kano', 'Katsina', 'Kebbi', 'Kogi', 'Kwara',
        'Lagos Central', 'Lagos North', 'Lagos East', 'Lagos South', 'Lagos West',
        'Nasarawa', 'Niger', 'Ogun Central', 'Ogun North', 'Ogun East', 'Ogun South', 'Ogun West',
        'Ondo', 'Osun', 'Oyo', 'Plateau', 'Rivers', 'Sokoto', 'Taraba', 'Yobe', 'Zamfara'
      ];

      const [screen, setScreen] = useState('dashboard');
      const [selectedRoles, setSelectedRoles] = useState([]);
      const [selectedStates, setSelectedStates] = useState([]);
      const [title, setTitle] = useState('');
      const [date, setDate] = useState('');
      const [time, setTime] = useState('10:00');
      const [location, setLocation] = useState('');
      const [description, setDescription] = useState('');
      const [sentNotices, setSentNotices] = useState([]);
      const [message, setMessage] = useState('');
      const [allContacts, setAllContacts] = useState([]);
      const [loading, setLoading] = useState(false);
      const [setupDone, setSetupDone] = useState(false);

      const roles = ['State President', 'State Secretary', 'Campus Coordinator', 'Campus Secretary'];

      // Load contacts from Google Sheet when app starts
      useEffect(() => {
        loadContacts();
        checkSetup();
      }, []);

      const checkSetup = () => {
        const isSetup = SCRIPT_URL !== "https://script.google.com/macros/s/AKfycbzhtERJu8Lacpcgz6zhK0jCMT15YtFCS-_O8k4Qy0xFeUInGYoLPOHy-Eby98nWLnBrkw/exec";
        setSetupDone(isSetup);
      };

      const loadContacts = async () => {
        try {
          setLoading(true);
          const response = await fetch(SCRIPT_URL + '?action=getContacts', {
            method: 'GET',
            mode: 'cors'
          });
          const data = await response.json();
          if (data.success) {
            setAllContacts(data.contacts);
          } else {
            setMessage({ type: 'error', text: 'Could not load contacts: ' + (data.error || 'Unknown error') });
          }
        } catch (error) {
          setMessage({ type: 'error', text: 'Connection error: ' + error.message + '. Make sure the Google Apps Script URL is correct.' });
        } finally {
          setLoading(false);
        }
      };

      const getFilteredContacts = () => {
        return allContacts.filter(contact => {
          const roleMatch = selectedRoles.length === 0 || selectedRoles.includes(contact.role);
          const stateMatch = selectedStates.length === 0 || selectedStates.includes(contact.state);
          return roleMatch && stateMatch;
        });
      };

      const toggleRole = (role) => {
        setSelectedRoles(prev => 
          prev.includes(role) ? prev.filter(r => r !== role) : [...prev, role]
        );
      };

      const toggleState = (state) => {
        setSelectedStates(prev => 
          prev.includes(state) ? prev.filter(s => s !== state) : [...prev, state]
        );
      };

      const filteredContacts = getFilteredContacts();

      const handleSend = async () => {
        if (!title || !date || !location) {
          setMessage({ type: 'error', text: 'Please fill in title, date, and location' });
          return;
        }
        
        if (filteredContacts.length === 0) {
          setMessage({ type: 'error', text: 'No recipients selected. Please select at least one role or state.' });
          return;
        }

        setLoading(true);

        try {
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              action: 'sendNotice',
              title,
              date,
              time,
              location,
              description,
              roles: selectedRoles,
              states: selectedStates
            })
          });

          const data = await response.json();

          if (data.success) {
            const notice = {
              id: sentNotices.length + 1,
              title,
              date,
              time,
              location,
              recipientCount: data.recipientCount,
              sentDate: new Date().toLocaleDateString()
            };
            setSentNotices([notice, ...sentNotices]);

            setMessage({
              type: 'success',
              text: `✓ Meeting notice sent to ${data.recipientCount} people! Emails and calendar invites are being delivered.`
            });

            // Reset form
            setTitle('');
            setDate('');
            setTime('10:00');
            setLocation('');
            setDescription('');
            setSelectedRoles([]);
            setSelectedStates([]);
            setScreen('dashboard');

            setTimeout(() => setMessage(''), 4000);
          } else {
            setMessage({ type: 'error', text: 'Error sending notice: ' + (data.error || 'Unknown error') });
          }
        } catch (error) {
          setMessage({ type: 'error', text: 'Failed to send: ' + error.message });
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="container">
          {!setupDone && (
            <div className="setup-box">
              <p><strong>⚠️ Setup Required:</strong></p>
              <p>Replace the SCRIPT_URL in the code with your Google Apps Script web app URL.</p>
              <p>See the VERCEL_DEPLOYMENT_GUIDE.txt file for step-by-step instructions.</p>
            </div>
          )}

          {screen === 'dashboard' && (
            <>
              <h1>AFCF Meeting Manager</h1>
              <p className="subtitle">Apostolic Faith Campus Fellowship - West & Central Africa</p>
              
              {message && (
                <div className={`${message.type}-msg`}>{message.text}</div>
              )}

              {loading && (
                <div className="warning-msg">Loading contacts from Google Sheet...</div>
              )}

              {!loading && allContacts.length === 0 && setupDone && (
                <div className="warning-msg">
                  No contacts found in your Google Sheet. Make sure you have the "AFCF Contact Registry" sheet with contacts.
                </div>
              )}

              {allContacts.length > 0 && (
                <p style={{ fontSize: '14px', color: '#666', marginBottom: '20px' }}>
                  📊 {allContacts.length} contacts loaded from your Google Sheet
                </p>
              )}

              <button className="primary" onClick={() => setScreen('compose')} disabled={loading}>
                + New meeting notice
              </button>

              {sentNotices.length > 0 && (
                <div style={{ marginTop: '24px' }}>
                  <h2 style={{fontSize: '16px', fontWeight: 500, marginBottom: '12px'}}>Recent notices</h2>
                  {sentNotices.map(notice => (
                    <div key={notice.id} className="card">
                      <div className="card-title">{notice.title}</div>
                      <div className="card-meta">
                        {notice.date} at {notice.time} · {notice.location}
                      </div>
                      <span className="recipient-count">{notice.recipientCount} recipients</span>
                      <div style={{fontSize: '12px', color: '#999', marginTop: '8px'}}>Sent {notice.sentDate}</div>
                    </div>
                  ))}
                </div>
              )}

              {sentNotices.length === 0 && allContacts.length > 0 && (
                <div className="empty-state" style={{ marginTop: '40px' }}>
                  <p>No meeting notices sent yet</p>
                </div>
              )}
            </>
          )}

          {screen === 'compose' && (
            <>
              <button className="back" onClick={() => setScreen('dashboard')}>← Back</button>
              <h1 style={{fontSize: '24px', marginBottom: '24px'}}>New meeting notice</h1>

              {message && (
                <div className={`${message.type}-msg`}>{message.text}</div>
              )}

              <div className="form-group">
                <label>Title</label>
                <input 
                  type="text"
                  placeholder="e.g., State Presidents Meeting"
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                />
              </div>

              <div className="grid-2">
                <div className="form-group" style={{marginBottom: 0}}>
                  <label>Date</label>
                  <input 
                    type="date"
                    value={date}
                    onChange={(e) => setDate(e.target.value)}
                  />
                </div>
                <div className="form-group" style={{marginBottom: 0}}>
                  <label>Time</label>
                  <input 
                    type="time"
                    value={time}
                    onChange={(e) => setTime(e.target.value)}
                  />
                </div>
              </div>

              <div className="form-group">
                <label>Location</label>
                <input 
                  type="text"
                  placeholder="e.g., AFCF Center, Lagos"
                  value={location}
                  onChange={(e) => setLocation(e.target.value)}
                />
              </div>

              <div className="form-group">
                <label>Description (optional)</label>
                <textarea 
                  placeholder="Meeting details..."
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                />
              </div>

              <div className="form-group">
                <label style={{marginBottom: '12px'}}>Select recipients by role</label>
                <div className="checkbox-group">
                  {roles.map(role => (
                    <label key={role}>
                      <input 
                        type="checkbox"
                        checked={selectedRoles.includes(role)}
                        onChange={() => toggleRole(role)}
                      />
                      {role}
                    </label>
                  ))}
                </div>
              </div>

              <div className="form-group">
                <label style={{marginBottom: '12px'}}>Or select by state/area</label>
                <div className="state-list">
                  {nigerianStates.map(state => (
                    <label key={state}>
                      <input 
                        type="checkbox"
                        checked={selectedStates.includes(state)}
                        onChange={() => toggleState(state)}
                      />
                      {state}
                    </label>
                  ))}
                </div>
              </div>

              <div className="preview-box">
                <label>Preview recipients:</label>
                <div className="preview-number">{filteredContacts.length} people</div>
                {filteredContacts.length > 0 && (
                  <div className="preview-list">
                    {filteredContacts.slice(0, 10).map(c => (
                      <div key={c.id} className="preview-list-item">
                        {c.name} — {c.role}
                      </div>
                    ))}
                    {filteredContacts.length > 10 && (
                      <div style={{marginTop: '8px', fontSize: '12px', color: '#999'}}>
                        ...and {filteredContacts.length - 10} more
                      </div>
                    )}
                  </div>
                )}
              </div>

              <div className="button-group">
                <button className="secondary" onClick={() => {
                  setTitle('');
                  setDate('');
                  setLocation('');
                  setDescription('');
                  setSelectedRoles([]);
                  setSelectedStates([]);
                  setScreen('dashboard');
                }} disabled={loading}>
                  Cancel
                </button>
                <button className="primary" onClick={handleSend} disabled={loading}>
                  {loading ? 'Sending...' : 'Send & invite'}
                </button>
              </div>
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<AFCFApp />);
  </script>
</body>
</html>
